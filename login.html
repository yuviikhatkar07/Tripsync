<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TripSync Login</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
}


.login-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    width: 100%;
    max-width: 400px;
    color: white;
}


.form-control {
    border-radius: 10px;
}


.btn-primary {
    border-radius: 25px;
}
</style>
</head>

<body>

<div class="login-card shadow-lg">

    <h2 class="text-center mb-4">TripSync Login</h2>

    <form onsubmit="loginUser(event)">
        
        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" id="password" class="form-control" required>
        </div>

        <button class="btn btn-primary w-100 mt-3">Login</button>

    </form>

    <div id="msg" class="mt-3 text-center"></div>

</div>

<script>
function loginUser(event) {
    event.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let msg = document.getElementById("msg");


    if (email === "user@gmail.com" && password === "1234") {
        msg.innerHTML = "<div class='alert alert-success'>Login Successful!</div>";

        setTimeout(() => {
            window.location.href = "tripsync.html";
        }, 1000);

    } else {
        msg.innerHTML = "<div class='alert alert-danger'>Invalid Credentials</div>";
    }
}
</script>

</body>
</html>
